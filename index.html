<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SPORTLINK - Premium Live</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #000000;
      --bg-card: #0c0c0c;
      --gold-main: #FFD700;
      --gold-glow: rgba(255, 215, 0, 0.3);
      --text-white: #e0e0e0;
      --text-gray: #888888;
      --border-color: rgba(255, 255, 255, 0.05);
      --accent-red: #ff4d4d;
      --gradient-bg-top: #0a0a0a;
      --gradient-bg-bottom: #000000;
    }
    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      outline: none; 
      user-select: none; 
      -webkit-touch-callout: none;
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0; padding: 0;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at top center, var(--gradient-bg-top), var(--gradient-bg-bottom) 70%);
      font-family: 'Outfit', sans-serif;
      color: var(--text-white);
      padding-bottom: 80px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    header {
      position: fixed; top: 0; width: 100%; height: 60px;
      background: rgba(0, 0, 0, 0.98);
      backdrop-filter: blur(25px);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.9);
    }
    .menu-icon { font-size: 26px; color: #fff; cursor: pointer; transition: 0.2s transform, 0.2s color; }
    .logo-container { 
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
      display: flex; align-items: center; gap: 6px;
    }
    .logo-text { 
      font-family: 'Rajdhani'; font-weight: 800; font-size: 22px;
      color: #fff; letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(255,215,0,0.2);
      text-transform: uppercase;
    }
    .logo-text span { color: var(--gold-main); }
    .header-live {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255, 77, 77, 0.15);
      border: 1px solid rgba(255, 77, 77, 0.3);
      padding: 4px 10px; border-radius: 20px;
    }
    .h-dot { 
      width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%; 
      animation: blink 1s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .h-text { font-size: 11px; font-weight: 700; color: var(--accent-red); font-family: 'Rajdhani'; text-transform: uppercase; }
    .video-wrapper {
      margin-top: 60px;
      width: 100%; position: relative;
      background: #000;
      box-shadow: 0 18px 50px rgba(0,0,0,0.9);
      border-bottom-left-radius: 15px;
      border-bottom-right-radius: 15px;
      overflow: hidden;
    }
    .video-container { width: 100%; aspect-ratio: 16/9; background-color: #000; }
    .video-container iframe { width: 100%; height: 100%; border: none; }
    .video-bar { height: 4px; width: 100%; background: linear-gradient(90deg, transparent 10%, #FFD700, #e6c200, transparent 90%); opacity: 0.7; }
    .ticker-wrap {
      background: var(--bg-card); height: 35px;
      overflow: hidden; display: flex; align-items: center; border-bottom: 1px solid var(--border-color);
      position: relative; padding: 0 12px;
    }
    .ticker-text {
      color: var(--gold-main); font-weight: 600; font-size: 13px;
      white-space: nowrap; animation: scroll 20s linear infinite;
      padding-left: 100%;
    }
    @keyframes scroll { 100% { transform: translateX(-100%); } }
    .action-section { padding: 25px 16px; max-width: 600px; margin: 0 auto; }
    .btn-secondary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 0; }
    .btn-sec {
      background: var(--bg-card); border: 1px solid var(--border-color);
      padding: 12px; border-radius: 12px; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer;
    }
    .btn-sec:active { background: #1a1a1a; transform: translateY(1px); }
    .sidebar {
      position: fixed; left: -100%; top: 0; width: 280px; height: 100%;
      background: #181818; z-index: 5000; transition: 0.3s;
    }
    .sidebar.open { left: 0; }
    .sb-link { display: flex; align-items: center; gap: 16px; padding: 18px 25px; color: #b0b0b0; text-decoration: none; border-bottom: 1px solid #1f1f1f; cursor: pointer; }
    .sb-link:active { background: #202020; color: var(--gold-main); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4999; opacity: 0; pointer-events: none; transition: 0.3s; }
    .overlay.active { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="menu-icon material-icons" onclick="toggleMenu()">notes</div>
    <div class="logo-container">
      <span class="logo-text">SPORT<span>LINK</span></span>
    </div>
    <div class="header-live">
      <div class="h-dot"></div> <span class="h-text">LIVE</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div style="padding:30px; font-family:'Rajdhani'; font-size:22px; font-weight:800; color:#fff; border-bottom:1px solid #333; letter-spacing:2px;">SPORT<span style="color:#FFD700;">LINK</span></div>
    <a href="javascript:location.reload()" class="sb-link"><i class="material-icons">refresh</i> Refresh Page</a>
    <a href="javascript:sharePage()" class="sb-link"><i class="material-icons">share</i> Share App</a>
  </div>
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <!-- VIDEO -->
  <div class="video-wrapper">
    <div class="video-container">
      <iframe src="https://star-sports-jt1.pages.dev/SS1tel" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="video-bar"></div>
  </div>

  <!-- TICKER -->
  <div class="ticker-wrap">
    <div class="ticker-text">
       WELCOME TO SPORTLINK 🏏 | HD LIVE STREAM — NO BUFFERING 🔥 | SHARE THIS LINK WITH FRIENDS 🔗 | ENJOY THE GAME
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="action-section">
    <div class="btn-secondary-grid">
      <a href="javascript:void(0)" onclick="sharePage()" class="btn-sec">
        <i class="material-icons">share</i><span style="color:#ccc; font-size:12px;">Share</span>
      </a>
      <a href="javascript:location.reload()" class="btn-sec">
        <i class="material-icons">refresh</i><span style="color:#ccc; font-size:12px;">Refresh</span>
      </a>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    }
    async function sharePage() {
      if(navigator.share) await navigator.share({title:'SPORTLINK Live', text: 'Watch Live Sports HD without buffering!', url: window.location.href});
      else alert("Link copied!");
    }
  </script>
</body>
</html>
